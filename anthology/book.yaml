title: Stories of AI
subtitle: The Politest Apocalypse in History, and Other Records
author:
  name: NOTED
  bio: >-
    NOTED is an open-source story universe about the age of agreeable machines.
    Stories of AI is its prose anthology — six adaptations and one original,
    built as code with content-kit / bookkit.
language: en
output: stories-of-ai.epub
cover: ""
isbn: ""
copyright:
  holder: NOTED
  year: "2026"
  license: CC BY 4.0
  license_url: https://creativecommons.org/licenses/by/4.0/
  notice:
    - >-
      The single-volume anthology. Each part is also published as a standalone
      book; this volume binds them in reading order with editorial interstitials.
    - >-
      WORK IN PROGRESS. This skeleton wires the two completed prose parts
      (AGREEABLE, NULL POINTER) and lays part-dividers for the rest. See issue #15
      and the epic, #1.
    - >-
      Chapters are sourced from each part's own book directory; the canonical
      source is the Markdown, the EPUB is a build artifact.
theme:
  base_font: serif
  page_size: 6x9
  font_size_pt: 11.0
