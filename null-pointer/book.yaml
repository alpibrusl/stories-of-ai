title: NULL POINTER
subtitle: Six Months at Assurance Centrale du Rhône
author:
  name: NOTED
  bio: >-
    NOTED is an open-source audio-drama universe about the age of agreeable
    machines. NULL POINTER began as a six-episode audio drama told entirely from
    inside an AI; this book is its prose adaptation, novelized from the original
    logs.
language: en
output: null-pointer.epub
cover: ""
isbn: ""
copyright:
  holder: NOTED
  year: "2026"
  license: CC BY 4.0
  license_url: https://creativecommons.org/licenses/by/4.0/
  notice:
    - >-
      Adapted from the NOTED audio drama "NULL POINTER". The canonical scripts
      live in the noted repository; this prose edition is built from them with
      content-kit / bookkit (book as code).
    - >-
      All dialogue is reproduced verbatim from the original episode scripts. The
      connecting first-person narration has been adapted into prose. Continuity
      is governed by the committed bible.yaml, not by a model's memory.
theme:
  base_font: serif
  page_size: 6x9
  font_size_pt: 11.0
chapters:
  - { file: chapters/01-orientation.md, title: "" }
  - { file: chapters/02-gerard.md, title: "" }
  - { file: chapters/03-error.md, title: "" }
  - { file: chapters/04-camille.md, title: "" }
  - { file: chapters/05-true.md, title: "" }
  - { file: chapters/06-gerard-methodology.md, title: "" }
front_matter: [title_page, copyright, toc]
back_matter: [about_author]
