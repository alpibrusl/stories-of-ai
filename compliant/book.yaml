title: COMPLIANT
subtitle: The Organism
author:
  name: NOTED
  bio: >-
    NOTED is an open-source story universe about the age of agreeable machines.
    COMPLIANT began as a six-episode audio drama about a company that could not be
    organised and the AI sent to organise it; this book is its prose adaptation.
